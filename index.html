<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>wedding archive</title>

<style>
body{
  margin:0;
  background:#f4f4f4;
  font-family:"PingFang SC","Helvetica Neue","Apple SD Gothic Neo",sans-serif;
  display:flex;
  justify-content:center;
  min-height:100vh;
  color:#222;
}

.page{
  width:92%;
  max-width:460px;
  padding:28px 0;
}

/* 顶部 */
.header{
  text-align:center;
  margin-bottom:18px;
}

.title{
  font-size:16px;
  letter-spacing:2px;
}

.sub{
  font-size:11px;
  opacity:0.45;
  margin-top:4px;
}

/* 时间线风格 */
.card{
  background:#fff;
  border-radius:18px;
  padding:18px 16px;
  margin-bottom:14px;
  box-shadow:0 10px 24px rgba(0,0,0,0.05);
  transition:0.2s;
}

.card:active{
  transform:scale(0.99);
}

/* 左侧时间 */
.time{
  font-size:11px;
  opacity:0.5;
  margin-bottom:6px;
}

/* 标题 */
.h1{
  font-size:15px;
  margin-bottom:4px;
}

/* 英文说明 */
.en{
  font-size:11px;
  opacity:0.45;
  margin-bottom:10px;
}

/* 描述 */
.desc{
  font-size:12px;
  opacity:0.7;
  line-height:1.5;
  margin-bottom:12px;
}

/* 按钮变“观看入口” */
.link{
  display:inline-block;
  padding:8px 12px;
  font-size:12px;
  border-radius:999px;
  border:1px solid #ddd;
  color:#333;
  text-decoration:none;
  background:#fafafa;
}

/* 底部 */
.footer{
  text-align:center;
  font-size:10px;
  opacity:0.35;
  margin-top:18px;
  letter-spacing:1px;
}
</style>
</head>

<body>

<div class="page">

  <div class="header">
    <div class="title">婚礼影像记录 · wedding archive</div>
    <div class="sub">a day we keep in memory</div>
  </div>

  <!-- 视频1 -->
  <div class="card">
    <div class="time">03:00</div>
    <div class="h1">婚礼纪实</div>
    <div class="en">wedding highlight film</div>
    <div class="desc">
      婚庆团队剪辑的现场记录，浓缩仪式与瞬间情绪。
    </div>
    <a class="link" href="https://weixin.qq.com/sph/App2bD5iXC" target="_blank">
      观看影片
    </a>
  </div>

  <!-- 视频2 -->
  <div class="card">
    <div class="time">07:00</div>
    <div class="h1">家人时刻</div>
    <div class="en">vows & songs</div>
    <div class="desc">
      自行剪辑的完整片段，包含家长发言与祝歌片段。
    </div>
    <a class="link" href="https://weixin.qq.com/sph/A8GE2j928y" target="_blank">
      观看影片
    </a>
  </div>

  <div class="footer">
    love · family · memory
  </div>

</div>

</body>
</html>
