<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>our wedding</title>

<style>
body{
  margin:0;
  background:#f6f6f6;
  font-family:"Helvetica Neue","PingFang SC","Apple SD Gothic Neo",sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#222;
}

.page{
  width:90%;
  max-width:420px;
  text-align:center;
}

/* 顶部标题 */
.title{
  font-size:16px;
  letter-spacing:2px;
  margin-bottom:6px;
  opacity:0.85;
}

.sub{
  font-size:11px;
  opacity:0.4;
  margin-bottom:18px;
}

/* 主卡片 */
.card{
  background:#fff;
  border-radius:18px;
  padding:26px 18px;
  box-shadow:0 12px 30px rgba(0,0,0,0.06);
}

/* 简洁符号 */
.icon{
  font-size:22px;
  margin-bottom:8px;
  color:#d9a6a6;
}

/* 分割线 */
.line{
  width:40px;
  height:1px;
  background:#eee;
  margin:14px auto;
}

/* 按钮 */
.btn{
  display:block;
  margin:10px 0;
  padding:13px;
  border-radius:14px;
  text-decoration:none;
  font-size:14px;
  border:1px solid #eee;
  color:#333;
  background:#fafafa;
  transition:0.25s ease;
}

.btn:active{
  transform:scale(0.98);
  background:#f0f0f0;
}

/* 底部 */
.footer{
  margin-top:18px;
  font-size:10px;
  opacity:0.35;
  letter-spacing:1px;
}

/* 轻微呼吸动画（ins风关键） */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(6px);}
  to{opacity:1; transform:translateY(0);}
}

.card{
  animation:fadeIn 0.6s ease-out;
}
</style>
</head>

<body>

<div class="page">

  <div class="title">wedding invitation</div>
  <div class="sub">thank you for being with us</div>

  <div class="card">

    <div class="icon">♡</div>

    <div style="font-size:15px; margin-bottom:6px;">our day</div>
    <div style="font-size:11px; opacity:0.45;">scan to watch our moments</div>

    <div class="line"></div>

    <a class="btn" href="https://weixin.qq.com/sph/App2bD5iXC" target="_blank">
      wedding film
    </a>

    <a class="btn" href="https://weixin.qq.com/sph/A8GE2j928y" target="_blank">
      family wishes
    </a>

  </div>

  <div class="footer">love · memory · thanks</div>

</div>

</body>
</html>
