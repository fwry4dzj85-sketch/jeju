<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>our day</title>

<style>
body{
  margin:0;
  background:#faf7f5;
  font-family:"PingFang SC","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#333;
}

.card{
  width:88%;
  max-width:420px;
  background:#fff;
  border-radius:18px;
  padding:28px 20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
  text-align:center;
}

.heart{
  font-size:26px;
  margin-bottom:10px;
  color:#e8b4b8;
}

.title{
  font-size:18px;
  font-weight:500;
  margin-bottom:4px;
}

.sub{
  font-size:12px;
  opacity:0.55;
  margin-bottom:22px;
}

.btn{
  display:block;
  margin:12px 0;
  padding:13px;
  border-radius:12px;
  text-decoration:none;
  font-size:15px;
  border:1px solid #eee;
  color:#444;
  background:#fafafa;
  transition:0.2s;
}

.btn:active{
  transform:scale(0.98);
  background:#f0e9e7;
}

.dot{
  margin-top:18px;
  font-size:11px;
  opacity:0.35;
}
</style>
</head>

<body>

<div class="card">

  <div class="heart">♡</div>

  <div class="title">thank you</div>
  <div class="sub">扫码观看我们的记录</div>

  <a class="btn" href="https://weixin.qq.com/sph/App2bD5iXC" target="_blank">
    婚礼主视频
  </a>

  <a class="btn" href="https://weixin.qq.com/sph/A8GE2j928y" target="_blank">
    亲友祝福
  </a>

  <div class="dot">love & thanks</div>

</div>

</body>
</html>
