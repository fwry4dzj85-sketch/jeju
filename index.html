<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>婚礼影像</title>

<style>
body{
  margin:0;
  background:#f5f5f5;
  font-family:"PingFang SC","Microsoft YaHei","Apple SD Gothic Neo",sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#222;
}

.wrap{
  width:90%;
  max-width:430px;
  text-align:center;
}

/* 顶部轻标题 */
.top{
  font-size:15px;
  letter-spacing:1px;
  margin-bottom:4px;
}

.top-sub{
  font-size:11px;
  opacity:0.45;
  margin-bottom:18px;
}

/* 卡片 */
.card{
  background:#fff;
  border-radius:20px;
  padding:28px 18px;
  box-shadow:0 10px 28px rgba(0,0,0,0.06);
  animation:fade 0.6s ease-out;
}

/* 装饰 */
.icon{
  font-size:22px;
  color:#d8a6a6;
  margin-bottom:8px;
}

.title-cn{
  font-size:17px;
  margin-bottom:4px;
}

.title-en{
  font-size:11px;
  opacity:0.45;
  letter-spacing:1px;
  margin-bottom:14px;
}

/* 分割线 */
.line{
  width:36px;
  height:1px;
  background:#eee;
  margin:14px auto;
}

/* 按钮 */
.btn{
  display:block;
  margin:10px 0;
  padding:13px;
  border-radius:14px;
  text-decoration:none;
  font-size:14px;
  border:1px solid #eee;
  background:#fafafa;
  color:#333;
  transition:0.2s ease;
}

.btn:active{
  transform:scale(0.98);
  background:#f0f0f0;
}

/* 韩语点缀 */
.ko{
  font-size:10px;
  opacity:0.35;
  margin-top:14px;
}

/* 底部 */
.footer{
  margin-top:16px;
  font-size:10px;
  opacity:0.35;
  letter-spacing:1px;
}

/* 动画 */
@keyframes fade{
  from{opacity:0; transform:translateY(8px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="wrap">

  <div class="top">婚礼影像 · wedding moments</div>
  <div class="top-sub">thank you for coming · 감사합니다</div>

  <div class="card">

    <div class="icon">♡</div>

    <div class="title-cn">我们的婚礼</div>
    <div class="title-en">our wedding day</div>

    <div class="line"></div>

    <a class="btn" href="https://weixin.qq.com/sph/ACjKiK7Bn" target="_blank">
      婚礼纪实（3分钟）/ wedding highlight
    </a>

    <a class="btn" href="https://weixin.qq.com/sph/A8GE2j928y" target="_blank">
      家人时刻（7分钟）/ vows & songs
    </a>

    <div class="ko">함께해주셔서 감사합니다</div>

  </div>

  <div class="footer">love · memory · thanks</div>

</div>

</body>
</html>
